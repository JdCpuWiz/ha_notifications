alias: Speedtest Alert
description: >
  Notifies only when Speedtest Tracker results fall below thresholds.
  Adjust download_threshold and upload_threshold to match your expected speeds.
trigger:
  - platform: webhook
    webhook_id: speedtest_alert
    allowed_methods:
      - POST
    local_only: true
action:
  - variables:
      download_mbps: "{{ trigger.json.data.download | default(0) | float }}"
      upload_mbps: "{{ trigger.json.data.upload | default(0) | float }}"
      ping_ms: "{{ trigger.json.data.ping | default(0) | float }}"
      server_name: "{{ trigger.json.data.server_name | default('') }}"
      # Adjust these thresholds to match your ISP plan
      download_threshold: 100
      upload_threshold: 20
  - condition: template
    value_template: "{{ download_mbps < download_threshold or upload_mbps < upload_threshold }}"
  - service: notify.mobile_app_skank
    data:
      title: "Speedtest: Slow speeds detected"
      message: >
        Down: {{ download_mbps | round(1) }} Mbps
        Up: {{ upload_mbps | round(1) }} Mbps
        Ping: {{ ping_ms | round(1) }} ms{% if server_name %} ({{ server_name }}){% endif %}
mode: single
